<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoLens</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:#020806;
    display:flex;align-items:center;justify-content:center;
    font-family:'Courier New',monospace;
    color:#00ff88;
  }
  .boot{text-align:center;opacity:0;animation:fadein .4s .1s forwards;}
  @keyframes fadein{to{opacity:1}}
  .boot-logo{font-size:22px;letter-spacing:4px;margin-bottom:8px;}
  .boot-sub{font-size:10px;letter-spacing:3px;color:rgba(0,255,136,0.4);}
  .boot-bar{
    width:180px;height:2px;background:rgba(0,255,136,0.12);
    border-radius:1px;margin:16px auto 0;overflow:hidden;
  }
  .boot-fill{height:100%;background:#00ff88;animation:fill .6s ease-out forwards;}
  @keyframes fill{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div class="boot">
  <div class="boot-logo">GEOLENS</div>
  <div class="boot-sub">ROUTING TO STATION</div>
  <div class="boot-bar"><div class="boot-fill"></div></div>
</div>
<script>
// ── DEVICE DETECTION ──
// Uses multiple signals for accuracy:
// 1. Touch capability
// 2. Screen width
// 3. User agent (as fallback)
// 4. Pointer type (coarse = touch screen)

function isMobileDevice() {
// Pointer media query — most reliable for touch devices
const coarsePointer = window.matchMedia(’(pointer: coarse)’).matches;

// Screen width threshold
const narrowScreen = window.innerWidth <= 768;

// User agent check (fallback)
const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|mobile/i.test(navigator.userAgent);

// Touch points (tablets + phones)
const hasTouch = navigator.maxTouchPoints > 1;

// Mobile = coarse pointer (touch) AND narrow screen, OR strong UA signal
return (coarsePointer && narrowScreen) || (mobileUA && narrowScreen) || (hasTouch && narrowScreen);
}

// Allow manual override via URL param: ?mode=mobile or ?mode=desktop
function getOverride() {
const params = new URLSearchParams(window.location.search);
return params.get(‘mode’); // ‘mobile’ | ‘desktop’ | null
}

// ── ROUTE ──
setTimeout(function() {
const override = getOverride();

if (override === ‘mobile’) {
window.location.replace(‘geolens_mobile.html’);
} else if (override === ‘desktop’) {
window.location.replace(‘geolens_station.html’);
} else if (isMobileDevice()) {
window.location.replace(‘geolens_mobile.html’);
} else {
window.location.replace(‘geolens_station.html’);
}
}, 650); // slight delay for the boot animation
</script>

</body>
</html>
