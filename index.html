<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoLens</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#020806;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;color:#00ff88;}
.boot{text-align:center;opacity:0;animation:fadein .4s .1s forwards;}
@keyframes fadein{to{opacity:1}}
.boot-logo{font-size:22px;letter-spacing:4px;margin-bottom:8px;}
.boot-sub{font-size:10px;letter-spacing:3px;color:rgba(0,255,136,0.4);}
.boot-bar{width:180px;height:2px;background:rgba(0,255,136,0.12);border-radius:1px;margin:16px auto 0;overflow:hidden;}
.boot-fill{height:100%;background:#00ff88;animation:fill .6s ease-out forwards;}
@keyframes fill{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div class="boot">
  <div class="boot-logo">GEOLENS</div>
  <div class="boot-sub">ROUTING TO STATION</div>
  <div class="boot-bar"><div class="boot-fill"></div></div>
</div>
<script>
var base = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
var isMobile = window.innerWidth <= 768 || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
var target = isMobile ? 'geolens_mobile.html' : 'geolens_app.html';
setTimeout(function() {
  window.location.replace(base + '/' + target);
}, 650);
</script>
</body>
</html>
